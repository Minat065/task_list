<section class="type03">
  <style>
    .type03 {
      height: 100%;
    }
    .type03 .grid {
      display: grid;
      grid-template-columns: {{ GRID_COLS }};
      gap: 1.5%;
      height: 85%;
    }
    .type03 .cell {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .type03 .cell-header {
      background: #000;
      color: white;
      padding: 0.3em 0.5em;
      font-size: 0.85em;
      text-align: center;
    }
    .type03 .cell-icon {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5em;
    }
    .type03 .cell-icon img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
    }
    .type03 .cell-desc {
      padding: 0.5em;
      font-size: 0.8em;
      text-align: center;
      color: var(--color-dark);
    }
  </style>

  <h2>{{ TITLE }}</h2>

  <div class="grid">
    {{ ITEMS }}
  </div>
</section>
