<section class="type01" data-auto-animate>
  <style>
    .type01 {
      display: grid;
      grid-template-columns: 60% 38%;
      grid-template-rows: auto 1fr 8%;
      gap: 2%;
      height: 100%;
    }
    .type01 h2 {
      grid-column: 1 / -1;
    }
    .type01 .main-visual {
      grid-row: 2;
      grid-column: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .type01 .main-visual img,
    .type01 .main-visual model-viewer {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .type01 .right-stack {
      grid-row: 2;
      grid-column: 2;
      display: grid;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 4%;
    }
    .type01 .bottom-bar {
      grid-column: 1 / -1;
      background: var(--color-dark);
      color: white;
      display: flex;
      align-items: center;
      padding: 0 2%;
      font-size: 0.9em;
      border-radius: 4px;
    }
  </style>

  <h2>{{ TITLE }}</h2>

  <div class="main-visual">
    {{ VISUAL }}
  </div>

  <div class="right-stack">
    {{ BLOCKS }}
  </div>

  <div class="bottom-bar">{{ BOTTOM_MESSAGE }}</div>
</section>
